version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: followmeeeaigc_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-followmeeeaigc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-followmeeeaigc_pass}
      POSTGRES_DB: ${POSTGRES_DB:-followmeeeaigc_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: followmeeeaigc_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: followmeeeaigc_backend
    depends_on:
      - db
      - redis
    ports:
      - "8011:8000"
    volumes:
      - ./backend:/app
      - outputs_data:/app/outputs

    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-followmeeeaigc}:${POSTGRES_PASSWORD:-followmeeeaigc_pass}@db:5432/${POSTGRES_DB:-followmeeeaigc_db}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CELERY_TASK_ALWAYS_EAGER=False
    extra_hosts:
      - "wsl.local:${WSL_IP}"
    env_file: .env
    restart: unless-stopped
    command: sh -c "alembic upgrade head || echo 'Alembic skipped/failed' && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: followmeeeaigc_worker
    depends_on:
      - db
      - redis
      - backend
    volumes:
      - ./backend:/app
      - outputs_data:/app/outputs
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-followmeeeaigc}:${POSTGRES_PASSWORD:-followmeeeaigc_pass}@db:5432/${POSTGRES_DB:-followmeeeaigc_db}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - CELERY_TASK_ALWAYS_EAGER=False
      - MAX_CONCURRENT_TASKS=${MAX_CONCURRENT_TASKS:-4}
    extra_hosts:
      - "wsl.local:${WSL_IP}"
    env_file: .env
    restart: unless-stopped
    command: sh -c "celery -A app.workers.celery_app worker --loglevel=info -c ${MAX_CONCURRENT_TASKS:-4}"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: followmeeeaigc_frontend
    depends_on:
      - backend
    ports:
      - "8090:80"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  outputs_data:
